# Credentials are NOT stored here. They live in ~/.config/murtaugh/.env (a
# template .env is seeded on first run) and are referenced below as ${VAR}.
# Keeping secrets out of YAML is what lets `murtaugh troubleshoot` ship the
# config files safely — the bundler collects the .yaml siblings, never .env.
oauth:
  app_token: ${SLACK_APP_TOKEN}
  bot_token: ${SLACK_BOT_TOKEN}

configuration:
  admin_user: murtaugh-admin
  # Users allowed to interact with the bot (slash commands, mentions, DMs).
  # The admin_user is implicitly allowed; leave the list empty to keep the bot
  # admin-only. Each entry may be a Slack user ID (e.g. U0123ABC) or a handle
  # (e.g. alice, @alice); handles are resolved to IDs at startup and the bot
  # refuses to start if any entry cannot be resolved.
  allowed_users: []
  # Users whose plain CHANNEL messages the bot answers WITHOUT an @mention
  # (it normally only replies to explicit mentions in channels). This waives
  # the mention requirement only — a listed user must STILL be in allowed_users
  # (or be the admin). Entries may be IDs or handles, resolved at startup.
  do_not_require_mention_from: []
  debug: false

chat:
  default_agent: default
  # Per-channel version of configuration.do_not_require_mention_from. Keys use
  # the same channel-ID / channel-NAME glob syntax as channel_agents (below);
  # values are the users waived from the mention requirement in matching
  # channels. The effective no-mention set for a channel is the UNION of the
  # global list and every matching pattern here.
  # channel_do_not_require_mention:
  #   feature-*: [alice, U0123ABC]
  #   incident-prod: [oncall]

# Slash commands (/murtaugh, /stop) are registered in the Slack app manifest,
# not here. Murtaugh recognises the verbs `chat`, `stop`, `troubleshoot`,
# `restart`, and `help` (e.g. `/murtaugh stop`, or a standalone `/stop`).

workflow-rules:
  # The "Test communication" ping → pong self-test is built into Murtaugh
  # itself (it is not a workflow rule): the binary posts the card and answers the
  # click directly, so the round-trip cannot be redirected by config or template
  # edits. Define your own rules below to react to other interactive buttons.
  #
  # A trigger has three mutually exclusive action types:
  #   * reply-to-slack — produce a Slack message JSON and post it back to the
  #     interaction. The JSON can come from a `template`, the stdout of a `run`
  #     command, or — as below — a `delegate-to-agent` block.
  #   * run — execute a command with the interaction payload on stdin.
  #   * delegate-to-agent — hand the work to an agent and forget it (no output
  #     captured); the agent acts through its own tools (it may post to Slack
  #     itself, open a PR, etc.).
  #
  # delegate-to-agent prompts are rendered with Go templates against the
  # interaction payload, exposed under `.Payload` (e.g. {{ .Payload.user.id }},
  # {{ index .Payload.channel "name" }}). An agent runs in an isolated one-shot
  # session — no shared chat memory.
  #
  # review-button:
  #   request_event: interactive
  #   match:
  #     type: block_actions
  #     actions:
  #       - action_id: review
  #   trigger:
  #     # Captured: the agent MUST return solely a valid Slack message JSON
  #     # object, which is posted back to the interaction. Non-JSON output is
  #     # logged and skipped.
  #     - reply-to-slack:
  #         delegate-to-agent:
  #           agent: default
  #           prompt: |
  #             Acknowledge the review request from {{ .Payload.user.id }} and
  #             return solely a valid Slack message JSON object confirming it.
  #     # Fire-and-forget: the agent does the work on its own; nothing is posted
  #     # for this trigger.
  #     - delegate-to-agent:
  #         agent: default
  #         prompt: |
  #           Review the open PR referenced in channel
  #           {{ index .Payload.channel "name" }} and post your findings there.

# workflow-rules may be omitted entirely; the built-in ping → pong self-test is
# handled natively by the binary regardless.

# Custom link unfurling (disabled by default — uncomment to enable). Requires
# the link_shared bot event plus the links:read and chat:write scopes, and each
# match.domain must be registered in the Slack app's "App Unfurl Domains" list
# (max 5) or no link_shared event is delivered. An unfurl action is exactly one
# of `template`, `run`, or `delegate-to-agent`.
#
# unfurl-rules:
#   # Template-based: build the preview from the URL's parts alone.
#   github-pr:
#     match:
#       domain: github.com
#       url_pattern: '^https://github\.com/(?P<owner>[^/]+)/(?P<repo>[^/]+)/pull/(?P<number>\d+)'
#     unfurl:
#       template: templates/unfurl/github-pr.json
#
#   # Agent-based: unlike a workflow trigger, an unfurl ALWAYS renders JSON — the
#   # agent's final output must be a valid Slack attachment, which becomes the
#   # preview. Non-JSON output is logged and the link is left un-unfurled. The
#   # prompt is rendered against the unfurl context, so it can reference
#   # {{ .URL }}, {{ .Domain }}, and named captures via {{ .Captures.<name> }}.
#   github-issues:
#     match:
#       domain: github.com
#       url_pattern: '^https://github\.com/(?P<owner>[^/]+)/(?P<repo>[^/]+)/issues/(?P<number>\d+)'
#     unfurl:
#       delegate-to-agent:
#         agent: default
#         prompt: |
#           Summarise GitHub issue {{ .URL }} and return me solely a valid Slack
#           attachment JSON object containing the summary in one paragraph. Lists
#           and emojis are allowed.
