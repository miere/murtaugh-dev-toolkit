oauth:
  app_token: xapp-fake-socket-mode-token
  bot_token: xoxb-fake-bot-token

configuration:
  admin_user: murtaugh-admin
  # Users allowed to interact with the bot (slash commands, mentions, DMs).
  # The admin_user is implicitly allowed; leave the list empty to keep the bot
  # admin-only. Each entry may be a Slack user ID (e.g. U0123ABC) or a handle
  # (e.g. alice, @alice); handles are resolved to IDs at startup and the bot
  # refuses to start if any entry cannot be resolved.
  allowed_users: []
  debug: false

chat:
  default_agent: default

commands:
  - name: /murtaugh
    description: Entrypoint for Murtaugh commands
  # Optional: register `/stop` in the Slack app config to allow interrupting
  # an in-flight chat response from inside the thread or DM. Murtaugh also
  # recognises `/<command> stop` (e.g. `/murtaugh stop`) so this entry is
  # only required if operators prefer the standalone form.
  - name: /stop
    description: Cancel the in-flight Murtaugh response in this thread or DM

workflow-rules:
  startup-ping-pong:
    request_event: interactive
    match:
      type: block_actions
      actions:
        - action_id: ping
    trigger:
      - reply-to-slack:
          template: ping/02-pong.json

# If workflow-rules is omitted entirely, Murtaugh still installs a built-in
# ping button workflow that renders ping/02-pong.json in the original message
# thread.

# Custom link unfurling. Requires the link_shared bot event plus the links:read
# and chat:write scopes, and each match.domain must be registered in the Slack
# app's "App Unfurl Domains" list (max 5) or no link_shared event is delivered.
unfurl-rules:
  github-pr:
    match:
      domain: github.com
      url_pattern: '^https://github\.com/(?P<owner>[^/]+)/(?P<repo>[^/]+)/pull/(?P<number>\d+)'
    unfurl:
      template: unfurl/github-pr.json