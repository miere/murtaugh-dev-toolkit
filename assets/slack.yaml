slack:
  app_token: xapp-fake-socket-mode-token
  bot_token: xoxb-fake-bot-token
  admin_user: murtaugh-admin
  debug: false

acp:
  enabled: false
  command: /path/to/acp-agent
  args: [--stdio]
  workdir: /path/to/workspace
  startup_timeout: 10s
  request_timeout: 10m
  session_idle_timeout: 30m
  max_sessions: 100
  stream_append_interval: 750ms
  stream_min_chunk_chars: 96
  stream_final_feedback: false

commands:
  - name: /murtaugh
    description: Entrypoint for Murtaugh commands

workflow-rules:
  startup-ping-pong:
    request_event: interactive
    match:
      type: block_actions
      actions:
        - action_id: ping
    trigger:
      - reply-to-slack:
          template: ping/02-pong.json

# If workflow-rules is omitted entirely, Murtaugh still installs a built-in
# ping button workflow that renders ping/02-pong.json in the original message
# thread.