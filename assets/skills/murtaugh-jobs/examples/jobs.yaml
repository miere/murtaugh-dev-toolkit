# Example jobs.yaml showing all three trigger modes plus agent delegation.
# Copy entries into your real ~/.config/murtaugh/jobs.yaml and edit.
#
# These hand-written entries omit `confirmed:`, so they are operator-trusted and
# a scheduled one auto-runs. The `jobs_define` tool instead writes each entry
# `confirmed: false`, which HOLDS its first scheduled run until the admin
# confirms it in their DM (see reference/scheduling.md).

jobs:
  # 1. MANUAL — neither schedule nor every. Runs only when invoked:
  #    murtaugh jobs run --name greet
  greet:
    command: /bin/echo
    args: ["hello from murtaugh"]

  # 2. CRON — runs automatically on a 5-field cron expression.
  #    Here: 02:00 every day. Requires the slack gateway to be running.
  nightly-backup:
    command: /usr/local/bin/backup.sh
    workdir: /var/data
    timeout: 30m
    schedule: "0 2 * * *"

  # 3. INTERVAL — runs automatically every fixed duration.
  #    Here: once an hour. Mutually exclusive with schedule.
  hourly-sync:
    command: /usr/bin/python3
    args: ["/Users/you/.config/murtaugh/automations/sync.py"]
    every: 1h

  # 4. AGENT — delegates to an agent instead of a command (mutually exclusive
  #    with `command`). Fire-and-forget: the agent acts through its own tools.
  #    Positional {{ N }} placeholders are filled from run-time args:
  #      murtaugh jobs run --name code-review-job --args 1234 --args /path/to/repo
  code-review-job:
    agent: default                  # an agent keyed in agents.yaml
    prompt: |
      Review the changes in PR {{ 1 }} at {{ 2 }} and post your feedback.
