# Jobs configuration for Murtaugh.
# Define jobs here by hand, or register them through the `jobs.define` tool:
#   murtaugh jobs define --name <n> --command <path> --args foo --args bar
# Then run them manually with:
#   murtaugh jobs run --name <n>
# Both commands are also exposed as MCP tools (jobs.define, jobs.run) when
# Murtaugh runs as `murtaugh mcp`.
#
# A job has three trigger modes:
#   * manual   — neither `schedule` nor `every` set: runs only via jobs.run
#                or a workflow trigger (the default).
#   * schedule — a standard 5-field cron expression, run automatically by the
#                `slack gateway` daemon (e.g. "0 2 * * *" = 02:00 every day).
#   * every    — a Go duration, run automatically at a fixed interval
#                (e.g. "1h", "30m").
# `schedule` and `every` are mutually exclusive. Scheduled runs only fire
# while the gateway daemon is running; edits here apply on the next restart.
#
# A job runs EITHER a `command` OR an agent (`agent` + `prompt`) — the two are
# mutually exclusive. An agent job starts the named agent (from agents.yaml) in
# an isolated one-shot session and sends the rendered prompt; it is
# fire-and-forget (the agent acts through its own tools). The prompt supports
# positional placeholders — {{ 1 }}, {{ 2 }}, ... — that expand to the args
# passed at run time:
#   murtaugh jobs run --name code-review-job --args 1234 --args /path/to/repo
# When no run-time args are given, the job's own `args` fill the placeholders,
# which is handy for scheduled agent jobs.

jobs:
  # AI assisted code review (agent-delegated).
  # code-review-job:
  #   # Run the "default" agent (defined in agents.yaml) instead of a command.
  #   agent: default
  #   # First arg is the PR number, second is the local repository path.
  #   prompt: |
  #     Review the code changes in this PR and provide feedback.
  #     - pr: {{ 1 }}
  #     - local repository: {{ 2 }}

  example-job:
    command: /bin/echo
    args: ["hello from murtaugh"]
    # workdir: /path/to/working/directory
    # timeout: 5m

  # Cron-scheduled: run every day at 02:00.
  # nightly-backup:
  #   command: /usr/local/bin/backup.sh
  #   schedule: "0 2 * * *"

  # Interval-scheduled: run once an hour.
  # hourly-sync:
  #   command: /usr/local/bin/sync.sh
  #   every: 1h
