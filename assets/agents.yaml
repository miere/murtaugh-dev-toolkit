# Runtime defaults applied to every agent, grouped by the concern each knob
# serves. The chat-surface gate (chat.enabled) lives in gateway.yaml.
defaults:
  session:
    idle_timeout: 30m
    request_timeout: 10m       # idle-bounded: reset by every agent event, not total wall-clock
    max_concurrent: 100
  rendering:
    # progress_display: how tool/step progress renders while a turn streams.
    # "simplified" (default) shows one small context-line message that updates in
    # place as the agent works and resolves to "✓ Done thinking" at the end;
    # "tasks" keeps the full multi-card plan. Per-agent profiles may override it.
    progress_display: simplified
    stream_min_chunk_chars: 96
    stream_append_interval: 750ms
  acp:                         # ACP child-process lifecycle (native agents ignore these)
    startup_timeout: 10s
    cancel_grace_period: 2s
  # approval:                  # global default, overridable per agent below
  #   terminal: allowlist      # native terminal-tool gate
  #   requests: ask            # how an ACP agent's own permission prompts are answered

# External MCP servers a native agent can attach to (referenced by name from an
# agent's `mcp_servers:` list below). Each server uses exactly one transport: a
# stdio child process (command/args/env) or a remote endpoint (url). Secrets in
# env come from ~/.config/murtaugh/.env via ${VAR}.
# mcp_servers:
#   vaultre:
#     command: vaultre-mcp
#     args: [--stdio]
#     env:
#       VAULTRE_TOKEN: ${VAULTRE_TOKEN}
#   data-api:
#     url: https://data-api.internal/mcp

agents:
  # --- Native agent (in-process LLM, no external ACP process) ----------------
  # Murtaugh talks to the model itself. Backend-specific knobs live under the
  # `native:` sub-block; shared knobs (workdir, tools, approval, mcp_servers)
  # stay at the top. Provider is one of gemini / anthropic / openai; GLM,
  # DeepSeek and Kimi ride the anthropic-/openai-compatible families via a
  # base_url override. The API key never lives here: api_key_env names the
  # variable in ~/.config/murtaugh/.env.
  # emily:
  #   workdir: ${HOME}/work/emily      # roots the files/terminal tools
  #   tools: [files, terminal, skills, slack, jobs, ask, present_plan, attach]  # native groups + registry namespaces
  #   # `ask` lets the agent put a question with options to you as clickable Slack
  #   # buttons and WAIT for your answer (instead of assuming one). Recommended.
  #   # `attach` lets the agent return a workspace file (report, image, export) to
  #   # you as a real downloadable upload; paths are confined to the workdir.
  #   # `present_plan` shows you a plan with Proceed / Revise / Cancel buttons and
  #   # WAITS for sign-off before the agent starts multi-step work.
  #   mcp_servers: [vaultre, data-api]               # additive on top of the global set
  #   # Approval gate: confirm side-effecting terminal commands in Slack before
  #   # they run. terminal: allowlist (default — auto-run recognized read-only
  #   # commands like ls/cat/grep/git status, ask for anything else), prompt (ask
  #   # for every command), or off (never ask). `allow` extends the read-only set
  #   # with your own commands (an argv0 like "kubectl", or a "binary subcommand"
  #   # like "docker ps"). Only active in live chat; scheduled/delegated runs are
  #   # never gated.
  #   approval:
  #     terminal: allowlist
  #     allow: [kubectl, "docker ps"]
  #   native:
  #     provider: gemini
  #     model: gemini-2.5-pro
  #     api_key_env: GEMINI_API_KEY
  #     # base_url:                            # set for Z.ai/DeepSeek/Kimi compat endpoints
  #     system_prompt_file: prompts/emily.md   # or inline `system_prompt: |`
  #     max_turns: 40
  #     # Context-window management — keeps a long thread within the model window.
  #     # context_limit: token budget; omit to use a per-provider-family default.
  #     # compaction: "truncate" (default — drop oldest turns) or "summarize"
  #     #             (LLM-compress the oldest turns, truncation as the fallback).
  #     context_limit: 1000000
  #     compaction: truncate
  #     # Prompt-cache TTL: "5m" (default) or "1h"; "off" disables. Applied for
  #     # Anthropic/OpenAI; Gemini caches the static system prefix implicitly.
  #     cache_retention: 5m
  #   # A workspace AGENTS.md (in the agent's workdir) is auto-loaded into the
  #   # system prompt as project guidelines — no config needed.

  # --- ACP agent (external process over ACP) ---------------------------------
  # The backend is chosen by the sub-block present: an `acp:` block makes this an
  # ACP agent, a `native:` block makes it native. Shared knobs (workdir, tools,
  # approval, progress_display, mcp_servers) sit at the top level.
  default:
    workdir: /path/to/workspace
    # progress_display: tasks   # per-agent override of the global default
    # approval:
    #   requests: ask           # how the agent's own permission prompts are answered
    acp:
      command: /path/to/acp-agent
      args: [--stdio]
      # interruptible: false    # omit to auto-detect session/cancel support at startup
      # env: extra environment variables for the agent process. Values are
      # expanded against Murtaugh's own environment (so "${HOME}" and "$PATH"
      # work) and layered on top of the inherited environment.
      # env:
      #   ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      #   PATH: ${HOME}/bin:${PATH}
